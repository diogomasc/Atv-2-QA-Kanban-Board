<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <meta name="description" content="Gerenciador de tarefas Kanban com suporte a responsáveis, prazos e prioridades" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <div class="header-title">
          <span class="header-icon">📋</span>
          <h1>Kanban Board</h1>
        </div>
        <div id="stats-bar" class="stats-bar"></div>
        <button id="btn-open-create" class="btn-primary">+ Nova Tarefa</button>
      </div>
    </header>

    <div class="app-layout">
      <aside class="filters-sidebar" id="filters-sidebar">
        <div class="filters-sidebar-header">
          <span class="filters-icon">🔍</span>
          <h2>Filtros</h2>
        </div>

        <div class="filter-group">
          <label for="filter-status">Status</label>
          <select id="filter-status" class="filter-select">
            <option value="">Todos os status</option>
            <option value="open">Aberta</option>
            <option value="in-progress">Em andamento</option>
            <option value="done">Concluída</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-priority">Prioridade</label>
          <select id="filter-priority" class="filter-select">
            <option value="">Todas as prioridades</option>
            <option value="high">Alta</option>
            <option value="medium">Média</option>
            <option value="low">Baixa</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-assignee">Responsável</label>
          <input id="filter-assignee" type="text" class="filter-input" placeholder="Filtrar por nome..." />
        </div>

        <div class="filter-actions">
          <button id="btn-filter" class="btn-primary btn-full">Filtrar</button>
          <button id="btn-clear-filter" class="btn-ghost btn-full">Limpar filtros</button>
        </div>

        <div class="filter-divider"></div>

        <div class="filter-legend">
          <p class="legend-title">Prioridades</p>
          <div class="legend-item">
            <span class="legend-dot" style="background:#ef4444"></span>
            <span>Alta</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="background:#f59e0b"></span>
            <span>Média</span>
          </div>
          <div class="legend-item">
            <span class="legend-dot" style="background:#22c55e"></span>
            <span>Baixa</span>
          </div>
        </div>
      </aside>

      <!-- Board Principal (rolável) -->
      <main class="board-wrapper">
        <div class="board" id="board">
          <div class="column" id="column-open">
            <div class="column-header open">
              <span class="column-icon">🔵</span>
              <h2>Aberta</h2>
              <span class="column-count" id="count-open"></span>
            </div>
            <div class="column-body" id="col-open"></div>
          </div>

          <div class="column" id="column-in-progress">
            <div class="column-header in-progress">
              <span class="column-icon">🟡</span>
              <h2>Em andamento</h2>
              <span class="column-count" id="count-in-progress"></span>
            </div>
            <div class="column-body" id="col-in-progress"></div>
          </div>

          <div class="column" id="column-done">
            <div class="column-header done">
              <span class="column-icon">🟢</span>
              <h2>Concluída</h2>
              <span class="column-count" id="count-done"></span>
            </div>
            <div class="column-body" id="col-done"></div>
          </div>
        </div>
      </main>
    </div>

    <!-- Modal: criar tarefa -->
    <div id="create-modal" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2>Nova Tarefa</h2>
          <button id="create-modal-close" class="btn-close">✕</button>
        </div>
        <form id="create-form" class="task-form">
          <div class="form-group">
            <label for="input-title">Título *</label>
            <input id="input-title" type="text" placeholder="Título da tarefa" required />
          </div>
          <div class="form-group">
            <label for="input-desc">Descrição</label>
            <textarea id="input-desc" placeholder="Descrição detalhada..." rows="3"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="input-assignee">Responsável</label>
              <input id="input-assignee" type="text" placeholder="Nome do responsável" />
            </div>
            <div class="form-group">
              <label for="input-deadline">Data limite</label>
              <input id="input-deadline" type="date" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="input-status">Status</label>
              <select id="input-status">
                <option value="open">Aberta</option>
                <option value="in-progress">Em andamento</option>
                <option value="done">Concluída</option>
              </select>
            </div>
            <div class="form-group">
              <label for="input-priority">Prioridade</label>
              <select id="input-priority">
                <option value="medium">Média</option>
                <option value="high">Alta</option>
                <option value="low">Baixa</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">Criar Tarefa</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal: editar tarefa -->
    <div id="edit-modal" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2>Editar Tarefa</h2>
          <button id="edit-modal-close" class="btn-close">✕</button>
        </div>
        <form id="edit-form" class="task-form">
          <div class="form-group">
            <label for="edit-title">Título *</label>
            <input id="edit-title" type="text" placeholder="Título da tarefa" required />
          </div>
          <div class="form-group">
            <label for="edit-desc">Descrição</label>
            <textarea id="edit-desc" placeholder="Descrição detalhada..." rows="3"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="edit-assignee">Responsável</label>
              <input id="edit-assignee" type="text" placeholder="Nome do responsável" />
            </div>
            <div class="form-group">
              <label for="edit-deadline">Data limite</label>
              <input id="edit-deadline" type="date" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="edit-status">Status</label>
              <select id="edit-status">
                <option value="open">Aberta</option>
                <option value="in-progress">Em andamento</option>
                <option value="done">Concluída</option>
              </select>
            </div>
            <div class="form-group">
              <label for="edit-priority">Prioridade</label>
              <select id="edit-priority">
                <option value="medium">Média</option>
                <option value="high">Alta</option>
                <option value="low">Baixa</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
